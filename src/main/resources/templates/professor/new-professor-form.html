<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Professor Profile Setup</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
</head>

<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Professor Profile Setup</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/professor/save-profile}" th:object="${professor}" method="post">
                        <input type="hidden" th:field="*{username}" />
                        
                        <div class="form-group">
                            <label for="professorName">Full Name</label>
                            <input type="text" class="form-control" id="professorName" 
                                   th:field="*{professorName}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="interests">Research Interests (comma-separated)</label>
                            <input type="text" class="form-control" id="interests" 
                                   th:field="*{interests}"
                                   placeholder="e.g. Artificial Intelligence,Data Mining,Cybersecurity">
                            <small class="form-text text-muted">Please separate multiple interests with commas</small>
                        </div>
                        
                        <div class="form-group text-right">
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>

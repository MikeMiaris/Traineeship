<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <title>Professor Dashboard</title>
</head>

<body>
<div class="container my-5">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="fas fa-chalkboard-teacher mr-2"></i>Welcome to Professor Dashboard
            </h3>
        </div>
        <div class="card-body">
            <div class="my-4">
                <h4>Logged in as: <span sec:authentication="name"></span></h4>
                <h5>Role: <span sec:authentication="authorities"></span></h5>
            </div>

            <hr class="my-4">

            <div class="d-flex flex-wrap">
                <a th:href="@{/professor/dashboard}" class="btn btn-primary btn-sm m-2">
                    <i class="fas fa-home"></i> Home
                </a>
                <a th:href="@{/professor/profile}" class="btn btn-primary btn-sm m-2">
                    <i class="fas fa-user"></i> Profile
                </a>
                <a th:href="@{/professor/traineeships}" class="btn btn-primary btn-sm m-2">
                    <i class="fas fa-briefcase"></i> Assigned Traineeships
                </a>
                
                <!-- Committee Dashboard Link (only visible for committee members) -->
                <div sec:authorize="hasRole('COMMITTEE')">
                    <a th:href="@{/Committee/dashboard}" class="btn btn-info btn-sm m-2">
                        <i class="fas fa-users-cog"></i> Committee Dashboard
                    </a>
                </div>
                
                <a th:href="@{/logout}" class="btn btn-danger btn-sm m-2">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js" integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js" integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k" crossorigin="anonymous"></script>

</body>
</html>

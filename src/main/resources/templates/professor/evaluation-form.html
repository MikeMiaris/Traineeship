<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Submit Evaluation</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <h1>Evaluate Traineeship #[[${positionId}]]</h1>
  <form th:action="@{/professor/evaluate/{id}(id=${positionId})}"
        th:object="${evaluation}"
        method="post">
    <div>
      <label for="motivation">Motivation (1–5):</label>
      <input type="number" id="motivation"
             th:field="*{motivation}" min="1" max="5" required />
    </div>
    <div>
      <label for="efficiency">Efficiency (1–5):</label>
      <input type="number" id="efficiency"
             th:field="*{efficiency}" min="1" max="5" required />
    </div>
    <div>
      <label for="effectiveness">Effectiveness (1–5):</label>
      <input type="number" id="effectiveness"
             th:field="*{effectiveness}" min="1" max="5" required />
    </div>
    <div>
      <button type="submit">Submit Evaluation</button>
    </div>
  </form>
  <p><a th:href="@{/professor/traineeships}">Back to My Traineeships</a></p>
</body>
</html>

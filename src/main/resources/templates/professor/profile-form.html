<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Professor Profile</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
  <h1>My Profile</h1>
  <form th:action="@{/professor/profile}"
        th:object="${profile}"
        method="post">
    <div>
      <label for="professorName">Full Name:</label>
      <input type="text" id="professorName"
             th:field="*{professorName}"
             placeholder="Enter your full name" required />
    </div>
    <div>
      <label for="interests">Interests:</label>
      <input type="text" id="interests"
             th:field="*{interests}"
             placeholder="e.g. AI, Databases" required />
    </div>
    <div>
      <button type="submit">Save Profile</button>
    </div>
  </form>
  <p><a th:href="@{/professor/traineeships}">View My Traineeships</a></p>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Student Profile</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Student Profile</h3>
                </div>
                <div class="card-body">
                    <!-- Username -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Username:</div>
                        <div class="col-md-8" th:text="${student.username}"></div>
                    </div>

                    <!-- Full Name -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Full Name:</div>
                        <div class="col-md-8" th:text="${student.studentName}"></div>
                    </div>

                    <!-- University ID (AM) -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">University ID (AM):</div>
                        <div class="col-md-8" th:text="${student.AM}"></div>
                    </div>

                    <!-- Average Grade -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Average Grade:</div>
                        <div class="col-md-8" th:text="${student.avgGrade}"></div>
                    </div>

                    <!-- Preferred Location -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Preferred Location:</div>
                        <div class="col-md-8" th:text="${student.preferredLocation}"></div>
                    </div>

                    <!-- Interests -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Interests:</div>
                        <div class="col-md-8" th:text="${student.interests}"></div>
                    </div>

                    <!-- Skills -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Skills:</div>
                        <div class="col-md-8" th:text="${student.skills}"></div>
                    </div>

                    <!-- Looking for Traineeship -->
                    <div class="row mb-3">
                        <div class="col-md-4 font-weight-bold">Looking for Traineeship:</div>
                        <div class="col-md-8" th:text="${student.lookingForTraineeship ? 'Yes' : 'No'}"></div>
                    </div>

                    <!-- Back to Dashboard -->
                    <div class="text-center mt-4">
                        <a th:href="@{/student/dashboard}" class="btn btn-primary">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>

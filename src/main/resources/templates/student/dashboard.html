<!-- student/dashboard.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css"
          integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS"
          crossorigin="anonymous">

    <title>Student Dashboard</title>
</head>
<body>
<div class="container my-5">
    <h2>Welcome to the Student Dashboard</h2>

    <div class="my-4">
        <h4>Logged in as: <span sec:authentication="name"></span></h4>
    </div>

    <hr class="my-4">

    <div class="mb-3">
        <a th:href="@{/student/dashboard}" class="btn btn-primary btn-sm mb-2">Home</a>
        <a th:href="@{/student/profile}" class="btn btn-primary btn-sm mb-2">Profile</a>
        <a th:href="@{/student/fill_logbook}" class="btn btn-primary btn-sm mb-2">Fill Logbook</a>
        <a th:href="@{/logout}" class="btn btn-danger btn-sm mb-2">Logout</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
</div>
</body>
</html>

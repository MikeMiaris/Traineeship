<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Student Profile Setup</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css"
          integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS"
          crossorigin="anonymous">
</head>

<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Student Profile Setup</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/student/save_profile}" th:object="${student}" method="post">
                        <input type="hidden" th:field="*{username}" />

                        <div class="form-group">
                            <label for="studentName">Full Name</label>
                            <input type="text" class="form-control" id="studentName"
                                   th:field="*{studentName}" required>
                        </div>

                        <div class="form-group">
                            <label for="AM">University ID (AM)</label>
                            <input type="text" class="form-control" id="AM"
                                   th:field="*{AM}" required>
                        </div>

                        <div class="form-group">
                            <label for="avgGrade">Average Grade</label>
                            <input type="number" step="0.01" class="form-control" id="avgGrade"
                                   th:field="*{avgGrade}">
                        </div>

                        <div class="form-group">
                            <label for="preferredLocation">Preferred Location</label>
                            <input type="text" class="form-control" id="preferredLocation"
                                   th:field="*{preferredLocation}"
                                   placeholder="e.g. Athens, Thessaloniki">
                        </div>

                        <div class="form-group">
                            <label for="interests">Interests (comma-separated)</label>
                            <input type="text" class="form-control" id="interests"
                                   th:field="*{interests}"
                                   placeholder="e.g. Web Development, AI, UX Design">
                            <small class="form-text text-muted">Separate multiple interests with commas</small>
                        </div>

                        <div class="form-group">
                            <label for="skills">Skills (comma-separated)</label>
                            <input type="text" class="form-control" id="skills"
                                   th:field="*{skills}"
                                   placeholder="e.g. Java, Python, SQL">
                            <small class="form-text text-muted">Separate multiple skills with commas</small>
                        </div>

                        <div class="form-group form-check">
                            <input type="checkbox" class="form-check-input" id="lookingForTraineeship"
                                   th:field="*{lookingForTraineeship}">
                            <label class="form-check-label" for="lookingForTraineeship">Looking for Traineeship</label>
                        </div>

                        <div class="form-group text-right">
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>

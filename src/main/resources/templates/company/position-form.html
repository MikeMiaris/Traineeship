<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>New Traineeship Position</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
</head>

<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Create New Traineeship Position</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/company/save_position}" th:object="${position}" method="post">
                        <div class="form-group">
                            <label for="title">Position Title</label>
                            <input type="text" class="form-control" id="title" 
                                   th:field="*{title}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea class="form-control" id="description" 
                                      th:field="*{description}" rows="3" required></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="fromDate">Start Date</label>
                                    <input type="date" class="form-control" id="fromDate" 
                                           th:field="*{fromDate}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="toDate">End Date</label>
                                    <input type="date" class="form-control" id="toDate" 
                                           th:field="*{toDate}" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
    					<label for="topics">Topics (comma-separated)</label>
    					<input type="text" class="form-control" id="topics" 
           					th:field="*{topics}" required
           					placeholder="e.g. Web Development,Data Analysis,Machine Learning">
    						<small class="form-text text-muted">Please separate multiple topics with commas</small>
						</div>

						<div class="form-group">
    					<label for="skills">Required Skills (comma-separated)</label>
    					<input type="text" class="form-control" id="skills" 
           					th:field="*{skills}" required
           					placeholder="e.g. Java,Python,SQL,Communication">
    					<small class="form-text text-muted">Please separate multiple skills with commas</small>
						</div>
                        
                        <div class="form-group text-right">
                            <button type="submit" class="btn btn-primary">Save Position</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>

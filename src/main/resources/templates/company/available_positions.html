<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Available Traineeship Positions</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="fas fa-list-alt mr-2"></i>Available Traineeship Positions
            </h3>
        </div>
        <div class="card-body">
            <!-- Error message display -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}"></span>
            </div>
            
            <div class="mb-4">
                <a th:href="@{/company/show_position_form}" class="btn btn-success">
                    <i class="fas fa-plus"></i> Add New Position
                </a>
                <a th:href="@{/company/list_assigned_positions}" class="btn btn-outline-secondary ml-2">
                    <i class="fas fa-briefcase"></i> View Assigned Positions
                </a>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="thead-light">
                        <tr>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Topics</th>
                            <th>Required Skills</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="position : ${available_positions}">
                            <td th:text="${position.title}"></td>
                            <td th:text="${position.description}"></td>
                            <td th:text="${#temporals.format(position.fromDate, 'dd/MM/yyyy')}"></td>
                            <td th:text="${#temporals.format(position.toDate, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span th:each="topic : ${#strings.arraySplit(position.topics, ',')}" 
                                      th:text="${#strings.trim(topic)}" 
                                      class="badge badge-info mr-1"></span>
                            </td>
                            <td>
                                <span th:each="skill : ${#strings.arraySplit(position.skills, ',')}" 
                                      th:text="${#strings.trim(skill)}" 
                                      class="badge badge-secondary mr-1"></span>
                            </td>
                            <td>
                                <a th:href="@{/company/delete_position/{id}(id=${position.id})}" 
                                   class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(available_positions)}">
                            <td colspan="7" class="text-center text-muted">
                                No available traineeship positions found
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="mt-4">
                <a th:href="@{/company/dashboard}" class="btn btn-outline-primary">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>

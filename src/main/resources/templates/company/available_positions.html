<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Positions</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Available Traineeship Positions</h2>
    
    <a th:href="@{/company/show_position_form}" class="btn btn-success mb-3">Add New Position</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Title</th>
            <th>Description</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="pos : ${available_positions}">
            <td th:text="${pos.title}">Title</td>
            <td th:text="${pos.description}">Description</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>

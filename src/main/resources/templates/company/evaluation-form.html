<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evaluate Traineeship</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Evaluate Assigned Traineeship</h2>

    <form th:action="@{/company/save_evaluation}" th:object="${evaluation}" method="post">
        <input type="hidden" name="position_id" th:value="${positionId}"/>

        <div class="form-group">
            <label>Feedback</label>
            <textarea th:field="*{feedback}" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <label>Rating (1–5)</label>
            <input type="number" th:field="*{rating}" min="1" max="5" class="form-control"/>
        </div>

        <button type="submit" class="btn btn-primary">Submit Evaluation</button>
    </form>
</div>
</body>
</html>

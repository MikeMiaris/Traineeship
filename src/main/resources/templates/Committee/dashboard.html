<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <title>Committee Dashboard</title>
</head>

<body>
<div class="container my-5">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="fas fa-users-cog mr-2"></i>Welcome to Committee Dashboard
            </h3>
        </div>
        <div class="card-body">
            <div class="my-4">
                <h4>Logged in as: <span sec:authentication="name"></span></h4>
            </div>

            <hr class="my-4">

            <div class="row">
                <div class="col-md-12">
                    <div class="card mb-4">
                        <div class="card-header bg-secondary text-white">
                            <h5 class="mb-0">Committee Actions</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-flex flex-wrap">
                                <!-- Button to list trainee applications -->
                                <a th:href="@{/Committee/List_Traineeship_Applications}" class="btn btn-primary btn-lg m-2">
                                    <i class="fas fa-list-ol mr-2"></i>View Traineeship Applications
                                </a>
                                
                                <!-- Button to list assigned traineeships -->
                                <a th:href="@{/Committee/list_Assigned_Traineeships}" class="btn btn-success btn-lg m-2">
                                    <i class="fas fa-clipboard-check mr-2"></i>View Assigned Traineeships
                                </a>
                                
                                <a th:href="@{/professor/dashboard}" class="btn btn-info btn-sm m-2">
                                    <i class="fas fa-check-circle"></i> Professor Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Display any errors -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                <span th:text="${error}"></span>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-between">
                <a th:href="@{/}" class="btn btn-outline-primary">
                    <i class="fas fa-home"></i> Home
                </a>
                <a th:href="@{/logout}" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js" integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js" integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k" crossorigin="anonymous"></script>

</body>
</html>

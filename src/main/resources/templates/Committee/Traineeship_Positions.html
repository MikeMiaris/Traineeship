<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Traineeship Positions</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="fas fa-briefcase mr-2"></i>Traineeship Positions
            </h3>
        </div>
        <div class="card-body">
            <!-- Error message display -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}"></span>
            </div>
            
            <div class="mb-4">
                <a th:href="@{/Committee/dashboard}" class="btn btn-outline-primary">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
                <span class="float-right">
                    <span th:text="'Student: ' + ${studentUsername}" class="font-weight-bold"></span>
                </span>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="thead-light">
                        <tr>
                            <th>Position Title</th>
                            <th>Company</th>
                            <th>Description</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="position : ${Traineeship_Positions}">
                            <td th:text="${position.title}"></td>
                            <td th:text="${position.company.companyName}"></td>
                            <td th:text="${position.description}"></td>
                            <td>
                                <div class="dropdown">
                                    <button class="btn btn-success dropdown-toggle btn-sm" type="button" 
                                            id="assignDropdown_${position.positionId}" 
                                            data-toggle="dropdown" aria-haspopup="true" 
                                            aria-expanded="false">
                                        Assign to Supervisor
                                    </button>
                                    <div class="dropdown-menu" aria-labelledby="assignDropdown_${position.positionId}">
                                        <a class="dropdown-item" 
                                           th:href="@{/Committee/assign_Position/{studentUsername}/{positionId}/load(studentUsername=${studentUsername}, positionId=${position.id})}">
                                            <i class="fas fa-clipboard mr-1"></i> Based on load
                                        </a>
                                        <a class="dropdown-item" 
                                           th:href="@{/Committee/assign_Position/{studentUsername}/{positionId}/interests(studentUsername=${studentUsername}, positionId=${position.id})}">
                                            <i class="fas fa-clipboard mr-1"></i> Based on interests
                                        </a>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(Traineeship_Positions)}">
                            <td colspan="6" class="text-center text-muted">
                                No traineeship positions found
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
